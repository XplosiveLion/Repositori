<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="tolggle.css">
</head>
<body>
  <div class="toggle"></div>

  <script>
    const toggle = document.querySelector('.toggle');

    toggle.addEventListener('click', () => {
      toggle.classList.toggle('on');
    });
  </script>
</body>
</html>

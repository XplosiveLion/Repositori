<html>
<head>
  <meta charset="utf-8">
  <title>JavaScript function that takes a number as a parameter and throws a custom 'Error' if the number is not an integer</title>
</head>
<body>

    <script>
        function invokeAfterDelay(callback) {
  setTimeout(callback, 2000); // 2000 milliseconds = 2 second
}
function display_message() {
  console.log('Hello!');
}
invokeAfterDelay(display_message); // Invokes the sayHello function after a 1-second delay

    </script>
</body>
</html>
